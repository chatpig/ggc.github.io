<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://gguf.us/logo.png" />
<title>ggc</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --card: #f5f5f5;
    --border: #ddd;
    --btn: #e0e0e0;
  }

  body.dark {
    --bg: #0f0f0f;
    --text: #ffffff;
    --card: #1a1a1a;
    --border: #333;
    --btn: #333;
  }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    width: 600px;
    text-align: center;
    position: relative;
  }

  h1 {
    margin-bottom: 20px;
  }

  .toggle {
    position: absolute;
    top: -40px;
    right: 0;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    background: var(--btn);
    border: 1px solid var(--border);
  }

  .tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .tab {
    padding: 10px 20px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    margin: 0 5px;
    border-radius: 8px;
    transition: 0.2s;
  }

  .tab.active {
    background: var(--text);
    color: var(--bg);
  }

  .code-box {
    position: relative;
    background: var(--card);
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    text-align: left;
    word-break: break-all;
    border: 1px solid var(--border);
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--btn);
    border: none;
    color: var(--text);
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
  }

  .copy-btn:hover {
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="container">
  <button class="toggle" onclick="toggleTheme()">🦞️💡</button>

  <h1>install gguf-connector</h1>

  <div class="tabs">
    <div class="tab active" onclick="setOS('unix')">🍎 macOS / 🐧 Linux</div>
    <div class="tab" onclick="setOS('windows')">🪟 Windows</div>
  </div>

  <div class="code-box">
    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    <code id="installCmd">
curl -fsSL https://ggc.gguf.org/install.sh | bash
    </code>
  </div>
</div>

<script>
  const unixCmd = "curl -fsSL https://ggc.gguf.org/install.sh | bash";
  const winCmd = "irm https://ggc.gguf.org/install.ps1 | iex";

  function setOS(os) {
    const codeEl = document.getElementById("installCmd");
    const tabs = document.querySelectorAll(".tab");

    tabs.forEach(tab => tab.classList.remove("active"));

    if (os === "unix") {
      codeEl.textContent = unixCmd;
      tabs[0].classList.add("active");
    } else {
      codeEl.textContent = winCmd;
      tabs[1].classList.add("active");
    }
  }

  function copyCode(button) {
    const text = document.getElementById("installCmd").textContent;

    navigator.clipboard.writeText(text).then(() => {
      const originalText = button.textContent;
      button.textContent = "Copied";
      button.disabled = true;

      setTimeout(() => {
        button.textContent = originalText;
        button.disabled = false;
      }, 2000);
    });
  }

  function toggleTheme() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  // Load saved theme
  (function () {
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
      document.body.classList.add("dark");
    }
  })();
</script>

</body>
</html>
